<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F4F2EC"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5E2D9" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Large jigsaw piece cluster — decorative, bottom-right -->
  <g transform="translate(820, 310)" opacity="0.13">
    <!-- Piece A -->
    <path d="M0,0 h60 q0,0 10,10 q10,20 0,30 q-10,10 -10,10 h0 v60 h-60 v-60 q0,0 -10,-10 q-10,-20 0,-30 q10,-10 10,-10 z" fill="#1a1a1a"/>
    <!-- Piece B -->
    <path d="M70,0 h60 v60 q0,0 10,10 q20,10 30,0 q10,-10 10,-10 v0 h0 v-60 h-60 q0,0 -10,-10 q-20,-10 -30,0 q-10,10 -10,10 z" fill="#1a1a1a" transform="translate(10,0)"/>
    <!-- Piece C -->
    <path d="M0,70 h60 v60 h-60 q0,0 -10,-10 q-20,-10 -30,0 q-10,10 -10,10 v0 z" fill="#1a1a1a" transform="translate(0,10)"/>
    <!-- Piece D -->
    <path d="M70,70 h60 q0,0 10,10 q10,20 0,30 q-10,10 -10,10 h0 v10 h-60 v-60 z" fill="#1a1a1a" transform="translate(10,10)"/>
  </g>

  <!-- 2×2 puzzle logo mark -->
  <g transform="translate(390, 185)">
    <!-- Card backing -->
    <rect x="-4" y="-4" width="68" height="68" rx="10" fill="#1a1a1a" opacity="0.06"/>

    <!-- 4 puzzle-colored squares -->
    <rect x="0"  y="0"  width="28" height="28" rx="4" fill="#E8B547"/>
    <rect x="32" y="0"  width="28" height="28" rx="4" fill="#C8533C"/>
    <rect x="0"  y="32" width="28" height="28" rx="4" fill="#2A4D6E"/>
    <rect x="32" y="32" width="28" height="28" rx="4" fill="#6B9F5E"/>

    <!-- Simple connector nubs to hint at puzzle pieces -->
    <circle cx="30" cy="14" r="5" fill="#1a1a1a" opacity="0.18"/>
    <circle cx="14" cy="30" r="5" fill="#1a1a1a" opacity="0.18"/>
    <circle cx="30" cy="46" r="5" fill="#1a1a1a" opacity="0.18"/>
    <circle cx="46" cy="30" r="5" fill="#1a1a1a" opacity="0.18"/>
  </g>

  <!-- App name -->
  <text x="470" y="228" font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600" font-size="52" fill="#1a1a1a" letter-spacing="-0.5">
    Jigsaw Solver
  </text>

  <!-- Tagline -->
  <text x="470" y="268" font-family="'IBM Plex Mono', 'Courier New', monospace"
        font-weight="400" font-size="19" fill="#6b6b6b" letter-spacing="0.02em">
    Real-time · Multiplayer · No sign-up
  </text>

  <!-- Divider -->
  <rect x="390" y="310" width="440" height="2" rx="1" fill="#E5E2D9"/>

  <!-- Feature pills -->
  <g font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="15" font-weight="500">
    <!-- Pill 1 -->
    <rect x="390" y="330" width="132" height="34" rx="17" fill="#1a1a1a"/>
    <text x="456" y="352" fill="#ffffff" text-anchor="middle">Share a code</text>

    <!-- Pill 2 -->
    <rect x="534" y="330" width="156" height="34" rx="17" fill="#E8B547"/>
    <text x="612" y="352" fill="#1a1a1a" text-anchor="middle">Drop in instantly</text>

    <!-- Pill 3 -->
    <rect x="702" y="330" width="128" height="34" rx="17" fill="#2A4D6E"/>
    <text x="766" y="352" fill="#ffffff" text-anchor="middle">Race to solve</text>
  </g>

  <!-- Bottom branding line -->
  <text x="600" y="430" font-family="'IBM Plex Mono', 'Courier New', monospace"
        font-size="13" fill="#aaa" text-anchor="middle" letter-spacing="0.12em">
    PUZZLE TOGETHER. COMPETE TOGETHER.
  </text>
</svg>
